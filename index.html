<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="Inspect Minecraft schematic files in a 3D browser viewer with layer controls and 360 degree orbit."
    />
    <meta name="color-scheme" content="light dark" />
    <link rel="apple-touch-icon" sizes="180x180" href="/favicon/apple-touch-icon.png" />
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon/favicon-32x32.png" />
    <link rel="icon" type="image/png" sizes="16x16" href="/favicon/favicon-16x16.png" />
    <link rel="icon" href="/favicon/favicon.ico" sizes="any" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@600;700;800&family=Bricolage+Grotesque:opsz,wght@12..96,400;12..96,500;12..96,600;12..96,700&family=Hanken+Grotesk:wght@400;450;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap"
      rel="stylesheet"
    />
    <style>
      :root {
        color-scheme: light;
        background: #eef0ed;
      }

      html[data-theme='dark'] {
        color-scheme: dark;
        background: #0e1418;
      }

      body {
        background: inherit;
      }
    </style>
    <script>
      (() => {
        const storageKey = 'schematic-editor-theme';
        const root = document.documentElement;

        try {
          const savedTheme = window.localStorage.getItem(storageKey);
          if (savedTheme === 'light' || savedTheme === 'dark') {
            root.dataset.theme = savedTheme;
            return;
          }
        } catch {
          // Keep the first paint usable when storage is unavailable.
        }

        if (window.matchMedia('(prefers-color-scheme: dark)').matches) {
          root.dataset.theme = 'dark';
        }
      })();
    </script>
    <title>Schematic Editor</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
