<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="Inspect Minecraft schematic files in a 3D browser viewer with layer controls and 360 degree orbit."
    />
    <meta name="color-scheme" content="light dark" />
    <style>
      :root {
        color-scheme: light;
        background: #edf2f1;
      }

      html[data-theme='dark'] {
        color-scheme: dark;
        background: #11191a;
      }

      body {
        background: inherit;
      }
    </style>
    <script>
      (() => {
        const storageKey = 'schematic-editor-theme';
        const root = document.documentElement;

        try {
          const savedTheme = window.localStorage.getItem(storageKey);
          if (savedTheme === 'light' || savedTheme === 'dark') {
            root.dataset.theme = savedTheme;
            return;
          }
        } catch {
          // Keep the first paint usable when storage is unavailable.
        }

        if (window.matchMedia('(prefers-color-scheme: dark)').matches) {
          root.dataset.theme = 'dark';
        }
      })();
    </script>
    <title>schematic-editor</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
