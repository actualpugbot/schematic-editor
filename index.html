<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="Inspect Minecraft schematic files in a 3D browser viewer with layer controls and 360 degree orbit."
    />
    <meta name="color-scheme" content="light dark" />
    <link rel="canonical" href="https://actualpugbot.github.io/schematic-editor/" />
    <meta property="og:type" content="website" />
    <meta property="og:title" content="Build Planner" />
    <meta
      property="og:description"
      content="Inspect and edit Minecraft schematic files in a 3D browser viewer with layer controls and 360 degree orbit. Files never leave your machine."
    />
    <meta property="og:url" content="https://actualpugbot.github.io/schematic-editor/" />
    <meta property="og:image" content="https://actualpugbot.github.io/schematic-editor/og-image.png" />
    <meta name="twitter:card" content="summary_large_image" />
    <link rel="apple-touch-icon" sizes="180x180" href="/favicon/apple-touch-icon.png" />
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon/favicon-32x32.png" />
    <link rel="icon" type="image/png" sizes="16x16" href="/favicon/favicon-16x16.png" />
    <link rel="icon" type="image/svg+xml" href="/favicon/icon.svg" />
    <link rel="icon" href="/favicon/favicon.ico" sizes="any" />
    <link rel="manifest" href="/favicon/site.webmanifest" />
    <link rel="preload" href="/fonts/hanken-grotesk-latin.woff2" as="font" type="font/woff2" crossorigin />
    <style>
      :root {
        color-scheme: light;
        background: #eef0ed;
      }

      html[data-theme='dark'] {
        color-scheme: dark;
        background: #0e1418;
      }

      body {
        background: inherit;
      }
    </style>
    <script>
      (() => {
        const storageKey = 'build-planner-theme';
        const legacyStorageKey = 'schematic-editor-theme';
        const root = document.documentElement;

        try {
          const savedTheme =
            window.localStorage.getItem(storageKey) ?? window.localStorage.getItem(legacyStorageKey);
          if (savedTheme === 'light' || savedTheme === 'dark') {
            root.dataset.theme = savedTheme;
            return;
          }
        } catch {
          // Keep the first paint usable when storage is unavailable.
        }

        if (window.matchMedia('(prefers-color-scheme: dark)').matches) {
          root.dataset.theme = 'dark';
        }
      })();
    </script>
    <title>Build Planner</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
