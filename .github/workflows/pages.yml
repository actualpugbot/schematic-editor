name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main
      - ui_redo
  workflow_dispatch:
    inputs:
      reason:
        description: Why the deploy was triggered.
        required: false
        type: string

permissions:
  actions: write
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  dispatch-main-deploy:
    if: github.event_name == 'push' && github.ref_name == 'ui_redo'
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Pages deploy from `main`
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          curl --fail --silent --show-error \
            -X POST \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer $GH_TOKEN" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            "https://api.github.com/repos/${{ github.repository }}/actions/workflows/pages.yml/dispatches" \
            -d '{"ref":"main","inputs":{"reason":"ui_redo sync"}}'

  build:
    if: github.ref_name == 'main'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.33.0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Fetch deployment branches
        run: git fetch origin main ui_redo

      - name: Build `main` site
        run: |
          git worktree add --detach ../pages-main origin/main
          cd ../pages-main
          pnpm install --frozen-lockfile
          VITE_BASE_PATH=/schematic-editor/ pnpm build
          mkdir -p ../pages-dist
          cp -R dist/. ../pages-dist/

      - name: Build `ui_redo` site
        run: |
          git worktree add --detach ../pages-ui-redo origin/ui_redo
          cd ../pages-ui-redo
          pnpm install --frozen-lockfile
          VITE_BASE_PATH=/schematic-editor/new/ pnpm build
          mkdir -p ../pages-dist/new
          cp -R dist/. ../pages-dist/new/

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ../pages-dist

  deploy:
    if: github.ref_name == 'main'
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
